<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.K. KARA | Premium Loha Kara Manufacturer</title>
    
    <meta name="description" content="S.K. KARA is a multi-generational premium Loha Kara manufacturer based in Amritsar, Punjab. Crafting authentic, heavy iron Karas with an elite finish." />
    <meta name="keywords" content="Loha Kara manufacturer, Amritsar Kara factory, premium iron kara, heavy loha kara online, buy kara Amritsar, traditional sikh kara, S.K. Kara Amritsar" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
        :root {
            --primary-gold: #D4AF37; 
            --deep-black: #070B08;   /* Infused deep black-green */
            --card-charcoal: #0F1611;/* Dark forest charcoal for cards */
            --forest-green: #051C0C; /* Rich, premium dark forest green */
            --border-green: #143D21; 
            --text-light: #FFFFFF;
            --text-muted: #A3B8A9;   /* Muted green-gray text */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--deep-black);
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            background: linear-gradient(to bottom, rgba(7,11,8,0.9), rgba(7,11,8,0));
            position: absolute;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--primary-gold);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-gold);
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 1rem;
            background: radial-gradient(circle at center, rgba(5, 28, 12, 0.6) 0%, rgba(7,11,8,1) 85%);
            position: relative;
        }

        .hero-content {
            max-width: 900px;
            z-index: 10;
        }

        .hero p {
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--primary-gold);
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 6px;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            color: var(--text-light);
        }

        .hero h1 span {
            color: var(--primary-gold);
            display: block;
            font-weight: 900;
            margin-top: 0.5rem;
        }

        .hero .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: none;
            margin-bottom: 3rem;
        }

        .cta-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            background: transparent;
        }
