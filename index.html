<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.K. KARA | Premium Loha Kara Manufacturer</title>

    <meta name="keywords" content="Loha Kara manufacturer, Amritsar Kara factory, premium iron kara, heavy loha kara online, buy kara Amritsar, traditional sikh kara, S.K. Kara Amritsar" />

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gold: #FFD700;       
            --accent-gold: #F4E285;        
            --deep-black: #000000;         
            --bg-gradient: #060A07;        
            --card-charcoal: #131814;      
            --text-light: #FFFFFF;         
            --text-muted: #CBD5E1;         
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--deep-black);
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Nav Slide Down Animation */
        nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 1.5rem 5%;
            background: #000000;
            width: 100%;
            z-index: 100;
            border-bottom: 2px solid var(--primary-gold);
            gap: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.75rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--primary-gold);
            text-decoration: none;
            line-height: 1.2;
        }

        .logo-regional {
            font-size: 0.9rem;
            color: var(--accent-gold);
            letter-spacing: 1px;
            margin-top: 0.3rem;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            list-style: none;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            position: relative;
            padding-bottom: 4px;
            transition: color 0.3s ease;
        }

        /* Underline Expansion Hover Animation */
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background-color: var(--primary-gold);
            transition: width 0.3s ease, left 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-gold);
        }

        .nav-links a:hover::after {
            width: 100%;
            left: 0;
        }

        /* Hero Entrance Animation */
        .hero {
            min-height: 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1rem;
            background: radial-gradient(circle at center, #0F1A11 0%, var(--deep-black) 100%);
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .hero-content {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .brand-logo-frame {
            margin-bottom: 2rem;
            width: 160px;
            height: auto;
            border: 2px solid var(--primary-gold);
            padding: 0.75rem;
            background: #000000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            border-radius: 6px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .brand-logo-frame:hover {
            transform: scale(1.04) rotate(1deg);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
        }

        .brand-logo-frame img {
            width: 100%;
            height: auto;
            display: block;
        }

        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            line-height: 1.4;
            margin-bottom: 1.5rem;
            color: var(--text-light);
        }

        .hero h1 span {
            color: var(--primary-gold);
            display: block;
            font-weight: 900;
            margin-top: 0.6rem;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .hero .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Metallic Shimmering Action Button Loop */
        .cta-btn {
            display: inline-block;
            padding: 0.9rem 2.25rem;
            border: 2px solid var(--primary-gold);
            color: var(--primary-gold);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: rgba(255, 215, 0, 0.03);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,215,0,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,215,0,0) 100%);
            transform: skewX(-25deg);
            animation: shineLoop 5s infinite linear;
        }

        .cta-btn:hover {
            background-color: var(--primary-gold);
            color: #000000;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.45);
            transform: translateY(-2px);
        }

        section {
            padding: 5rem 1rem;
            background-color: var(--deep-black);
        }

        /* Reveal-on-scroll classes applied dynamically or using continuous window scroll styling */
        .scroll-reveal {
            opacity: 0;
            transform: translateY(30px);
            animation: scrollRevealFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        #collection {
            background: linear-gradient(to bottom, var(--deep-black), var(--bg-gradient));
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 3rem;
            color: var(--primary-gold);
            text-transform: uppercase;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 2px;
            background-color: var(--primary-gold);
            margin: 0.8rem auto 0;
        }

        .legacy-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .legacy-text h3 {
            font-family: 'Cinzel', serif;
