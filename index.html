<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.K. KARA | Premium Loha Kara Manufacturer</title>
    
    <meta name="description" content="S.K. KARA is a multi-generational premium Loha Kara manufacturer based in Amritsar, Punjab. Crafting authentic, heavy iron Karas with an elite finish." />
    <meta name="keywords" content="Loha Kara manufacturer, Amritsar Kara factory, premium iron kara, heavy loha kara online, buy kara Amritsar, traditional sikh kara, S.K. Kara Amritsar" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --premium-gold: #D4AF37;       /* Muted Champagne Gold */
            --soft-gold: #E6D5B8;          /* Soft Warm Sand Highlighting */
            --deep-black: #0A0D0A;         /* Rich Steel-Tinted Dark Base */
            --pure-black: #000000;         /* Stark Black for clean spacing */
            --card-charcoal: #141A15;      /* Solid, deep slate surface */
            --text-pure: #FFFFFF;          /* Crisp Ice White */
            --text-muted: #94A3B8;         /* Subdued Slate Grey for long text */
            --border-low: rgba(212, 175, 55, 0.15); /* Thin subtle metallic edge */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--deep-black);
            color: var(--text-pure);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: block; /* Force basic block display for stability */
        }

        /* Nav Layout */
        nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 1.5rem 5%;
            background: var(--pure-black);
            width: 100%;
            z-index: 100;
            border-bottom: 1px solid var(--border-low);
            gap: 1rem;
            box-shadow: 0 4px 30px rgba(0,0,0,0.7);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-pure);
            text-decoration: none;
            line-height: 1.2;
        }

        .logo-regional {
            font-size: 0.85rem;
            color: var(--premium-gold);
            letter-spacing: 1px;
            margin-top: 0.3rem;
            font-weight: 500;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            list-style: none;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            position: relative;
            padding-bottom: 4px;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background-color: var(--premium-gold);
            transition: width 0.3s ease, left 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--text-pure);
        }

        .nav-links a:hover::after {
            width: 100%;
            left: 0;
        }

        /* Hero Layout */
        .hero {
            min-height: 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1rem;
            background: radial-gradient(circle at center, #111812 0%, var(--pure-black) 100%);
            border-bottom: 1px solid var(--border-low);
        }

        .hero-content {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-logo-frame {
            margin-bottom: 2rem;
            width: 150px;
            height: auto;
            border: 1px solid var(--border-low);
            padding: 0.5rem;
            background: var(--pure-black);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px;
            transition: transform 0.4s ease, border-color 0.4s ease;
        }

        .brand-logo-frame:hover {
            transform: scale(1.03);
            border-color: var(--premium-gold);
        }

        .brand-logo-frame img {
            width: 100%;
            height: auto;
            display: block;
        }

        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 3px;
            line-height: 1.4;
            margin-bottom: 1.5rem;
            color: var(--text-pure);
        }

        .hero h1 span {
            color: var(--premium-gold);
            display: block;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .hero .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Muted Action Button */
        .cta-btn {
            display: inline-block;
            padding: 0.9rem 2.25rem;
            border: 1px solid var(--premium-gold);
            color: var(--premium-gold);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: transparent;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: shineLoop 6s infinite linear;
        }

        .cta-btn:hover {
            background-color: var(--premium-gold);
            color: var(--pure-black);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
        }

        section {
            padding: 5rem 1rem;
            background-color: var(--deep-black);
            display: block; /* Strict rendering fallback safety */
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 3.5rem;
            color: var(--text-pure);
            text-transform: uppercase;
        }
