<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.K. KARA | Premium Loha Kara Manufacturer</title>
    
    <meta name="description" content="S.K. KARA is a multi-generational premium Loha Kara manufacturer based in Amritsar, Punjab. Crafting authentic, heavy iron Karas with an elite finish." />
    <meta name="keywords" content="Loha Kara manufacturer, Amritsar Kara factory, premium iron kara, heavy loha kara online, buy kara Amritsar, traditional sikh kara, S.K. Kara Amritsar" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Montserrat:wght400;500;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --premium-gold: #D4AF37;       /* Muted Champagne Gold (Elegant, not neon) */
            --soft-gold: #E6D5B8;          /* Soft Warm Sand Highlight */
            --deep-black: #0A0D0A;         /* Rich Steel-Tinted Dark Base */
            --pure-black: #000000;         /* Stark Black for clean spacing */
            --card-charcoal: #141A15;      /* Solid, deep slate surface */
            --text-pure: #FFFFFF;          /* Crisp Ice White */
            --text-muted: #94A3B8;         /* Subdued Slate Grey for long text */
            --border-low: rgba(212, 175, 55, 0.15); /* Thin subtle metallic edge */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--deep-black);
            color: var(--text-pure);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Nav Layout */
        nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 1.5rem 5%;
            background: var(--pure-black);
            width: 100%;
            z-index: 100;
            border-bottom: 1px solid var(--border-low);
            gap: 1rem;
            box-shadow: 0 4px 30px rgba(0,0,0,0.7);
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-pure); /* Changed to pure white for high-end look */
            text-decoration: none;
            line-height: 1.2;
        }

        .logo-regional {
            font-size: 0.85rem;
            color: var(--premium-gold); /* Gold used purely as a subtle subtitle accent */
            letter-spacing: 1px;
            margin-top: 0.3rem;
            font-weight: 500;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            list-style: none;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            position: relative;
            padding-bottom: 4px;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background-color: var(--premium-gold);
            transition: width 0.3s ease, left 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--text-pure);
        }

        .nav-links a:hover::after {
            width: 100%;
            left: 0;
        }

        /* Hero Layout */
        .hero {
            min-height: 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1rem;
            background: radial-gradient(circle at center, #111812 0%, var(--pure-black) 100%);
            border-bottom: 1px solid var(--border-low);
        }

        .hero-content {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .brand-logo-frame {
            margin-bottom: 2rem;
            width: 150px;
            height: auto;
            border: 1px solid var(--border-low);
            padding: 0.5rem;
            background: var(--pure-black);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px;
            transition: transform 0.4s ease, border-color 0.4s ease;
        }

        .brand-logo-frame:hover {
            transform: scale(1.03);
            border-color: var(--premium-gold);
        }

        .brand-logo-frame img {
            width: 100%;
            height: auto;
            display: block;
        }

        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 3px;
            line-height: 1.4;
            margin-bottom: 1.5rem;
            color: var(--text-pure);
        }

        .hero h1 span {
            color: var(--premium-gold);
            display: block;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .hero .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Muted Action Button */
        .cta-btn {
            display: inline-block;
            padding: 0.9rem 2.25rem;
            border: 1px solid var(--premium-gold);
            color: var(--premium-gold);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: transparent;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: shineLoop 6s infinite linear;
        }

        .cta-btn:hover {
            background-color: var(--premium-gold);
            color: var(--pure-black);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
        }

        section {
            padding: 5rem 1rem;
            background-color: var(--deep-black);
        }

        .scroll-reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s cubic-bezier(0.215, 0.610, 0.355, 1), transform 0.8s cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 3.5rem;
            color: var(--text-pure);
            text-transform: uppercase;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 1px;
            background-color: var(--premium-gold);
            margin: 0.8rem auto 0;
        }

        .legacy-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .legacy-text h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.35rem;
            color: var(--text-pure);
            margin-bottom: 1.25rem;
            letter-spacing: 1px;
        }

        .legacy-text p {
            color: var(--text-muted);
            margin-bottom: 1.25rem;
            font-size: 0.95rem;
        }

        .legacy-text strong {
            color: var(--text-pure);
            font-weight: 600;
        }

        .legacy-image-box {
            border: 1px solid var(--border-low);
            padding: 3rem 1rem;
            background: var(--card-charcoal);
            text-align: center;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: border-color 0.4s ease;
        }

        .legacy-image-box:hover {
            border-color: rgba(212, 175, 55, 0.3);
        }

        .legacy-badge {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 6rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.03);
            line-height: 1;
            margin-bottom: 0.5rem;
            transition: color 0.4s ease;
        }

        .legacy-image-box:hover .legacy-badge {
            color: rgba(212, 175, 55, 0.06);
        }

        .legacy-badge-title {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Refined Balanced Product Cards */
        .card {
            background-color: var(--card-charcoal);
            border: 1px solid var(--border-low);
            text-align: center;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: border-color 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover {
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }

        .card-body {
            padding: 2rem 1.5rem;
        }

        .card-img-top {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 1px solid var(--border-low);
        }

        .card h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.25rem;
            margin-bottom: 0.85rem;
            letter-spacing: 1px;
            color: var(--text-pure);
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
            font-weight: 400;
        }

        .card-action {
            padding: 0 1.5rem 2rem;
        }

        .whatsapp-btn {
            display: block;
            background-color: #1E291B; /* Dark structural button instead of neon green */
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text-pure);
            text-decoration: none;
            padding: 0.85rem;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .whatsapp-btn:hover {
            background-color: #25D366; /* Shows color only on action intent */
            border-color: #25D366;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2);
            transform: scale(1.02);
        }

        .language-support-box {
            background-color: var(--pure-black);
            border: 1px solid var(--border-low);
            padding: 2.5rem 1.75rem;
            max-width: 1200px;
            margin: 3rem auto 1rem;
            border-radius: 6px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .lang-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .lang-column h3 {
            font-family: 'Cinzel', serif;
            color: var(--premium-gold);
            margin-bottom: 0.75rem;
            letter-spacing: 1px;
            font-size: 1.15rem;
        }

        .lang-column p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        footer {
            background-color: var(--pure-black);
            padding: 4rem 1rem 3rem;
            border-top: 1px solid var(--border-low);
        }

        .footer-layout {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-heading {
            font-family: 'Cinzel', serif;
            color: var(--text-pure);
            font-size: 1.25rem;
            letter-spacing: 1.5px;
            margin-top: 2rem;
            margin-bottom: 1.25rem;
            text-transform: uppercase;
        }

        .address-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        .phone-link-box {
            display: block;
            background-color: var(--card-charcoal);
            border: 1px solid var(--border-low);
            color: var(--text-pure);
            text-decoration: none;
            padding: 1rem;
            margin-bottom: 0.85rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.95rem;
            width: 100%;
            max-width: 480px;
            transition: all 0.3s ease;
        }

        .phone-link-box:hover {
            border-color: var(--premium-gold);
            background-color: #19201A;
            transform: translateX(3px);
        }

        .hours-info-box {
            display: block;
            background-color: rgba(255,255,255,0.02);
            border: 1px solid var(--border-low);
            color: var(--text-muted);
            padding: 1.25rem;
            margin-top: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--text-pure);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-charcoal);
            border: 1px solid var(--border-low);
            color: var(--text-pure);
            padding: 0.9rem;
            font-family: 'Montserrat', sans-serif;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--premium-gold);
        }

        .submit-btn {
            background-color: transparent;
            color: var(--premium-gold);
            border: 1px solid var(--premium-gold);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 1rem 1.75rem;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
            max-width: 350px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background-color: var(--premium-gold);
            color: var(--pure-black);
            transform: translateY(-2px);
        }

        .copyright-bar {
            text-align: center;
            margin-top: 4rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes shineLoop {
            0% { left: -150%; }
            25%, 100% { left: 150%; }
        }

        @media (min-width: 768px) {
            nav {
                flex-direction: row;
                justify-content: space-between;
                padding: 1.75rem 5%;
                gap: 0;
            }
            .logo-container {
                align-items: flex-start;
            }
            .logo { font-size: 1.85rem; }
            .hero { min-height: 80vh; padding: 6rem 1rem 3rem; }
            .hero h1 { font-size: 3.8rem; letter-spacing: 5px; }
            .brand-logo-frame { width: 190px; }
            .section-title {
